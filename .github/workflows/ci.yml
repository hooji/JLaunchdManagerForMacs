name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Baseline is JDK 25 LTS: the Windows backend (internal/windows) uses the
      # java.lang.foreign (FFM) API, final in JDK 22 — 25 is the first LTS with it final.
      # The macOS/systemd/OpenRC modules remain 21-compatible, but the single jar is 25.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      # Discovery is real on macOS; on Linux/Windows the CLI prints a friendly
      # "not implemented yet" message and exits 0. Either way it must not crash.
      - name: Smoke-test discovery CLI
        run: java -jar target/servicepal.jar
