name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Baseline is JDK 25 LTS: the Windows FFM service host (internal/windows) needs FFM,
      # final in JDK 22; 25 is the first LTS with it final. The macOS/systemd paths are
      # 21-compatible, but the single jar builds on 25.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      # Discovery is real on macOS, Linux/systemd and Windows. Either way it must not crash.
      # --enable-native-access lets the Windows backend reach the SCM via FFM without a warning
      # (JEP 472); harmless on the subprocess-only platforms.
      - name: Smoke-test discovery CLI
        run: java --enable-native-access=ALL-UNNAMED -jar target/servicepal.jar
