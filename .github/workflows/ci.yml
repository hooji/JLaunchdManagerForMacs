name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Baseline is JDK 25 LTS — the Windows backend uses the Foreign Function & Memory API
      # (final in JDK 22; 25 is the first LTS with it final). macOS/systemd/OpenRC stay
      # source-compatible with JDK 21, but the single jar is built for 25.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      # The discovery CLI must run without crashing on every OS. It constructs the real
      # backend, so on Windows this also exercises the FFM SCM bindings (the jar's manifest
      # grants native access, so no flag is needed).
      - name: Smoke-test discovery CLI
        run: java -jar target/servicepal.jar
