name: Probe (cross-platform manual run)

# Not tests — these are exploratory probes that build the jar and RUN the discovery
# CLI on each platform so we can see how the code behaves on real systems and iterate.
# Triggered manually (workflow_dispatch); also runs on pushes to the active dev branch
# so changes can be validated without waiting for a merge (remove that trigger later).
on:
  workflow_dispatch:
  push:
    branches: [claude/project-familiarization-p3hdgl]

permissions:
  contents: read

jobs:
  probe:
    name: probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build jar
        run: mvn -B -ntp -DskipTests package

      - name: Probe — run as the normal user
        shell: bash
        run: java -jar target/servicepal.jar || true

      # Real mutation lifecycle (install -> start -> inspect -> uninstall) of a throwaway
      # service. macOS does the real work; Linux non-root prints SKIP. Non-fatal so the probe
      # stays informational — read the SELFTEST PASS/FAIL line in the log. (Windows has its own
      # step below, because the FFM service host needs --enable-native-access.)
      - name: Probe — mutation self-test
        if: runner.os != 'Windows'
        shell: bash
        run: java -cp target/servicepal.jar com.u1.servicepal.cli.SelfTestCli || true

      # Windows: the bundled pure-Java FFM ServiceHost speaks the SCM protocol, so the runner
      # actually installs -> starts -> RUNNING(+pid) -> uninstalls a real service. windows-latest
      # runs as an administrator, which CreateService requires. --enable-native-access silences
      # the JEP 472 restricted-method warning for our FFM calls (and the host inherits the flag
      # in its own binPath).
      - name: Probe — mutation self-test (Windows, admin + native access)
        if: runner.os == 'Windows'
        shell: bash
        run: java --enable-native-access=ALL-UNNAMED -cp target/servicepal.jar com.u1.servicepal.cli.SelfTestCli || true

      # systemd installs a system-wide unit, which needs root — run the self-test under sudo
      # on Linux (the ubuntu runner is systemd). macOS already covered by the non-sudo step.
      - name: Probe — mutation self-test (root, systemd)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo "$(which java)" -cp target/servicepal.jar com.u1.servicepal.cli.SelfTestCli || true

      - name: Probe — run as root (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: sudo "$(which java)" -jar target/servicepal.jar || true

      - name: macOS — raw launchctl print format (ground truth)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Dump to files first: piping a large stream into `head` closes the pipe early and,
          # under the default `pipefail`, SIGPIPE would fail the step. Reading files is safe.
          set +o pipefail
          sudo launchctl print system >/tmp/sys.txt 2>/dev/null || true
          echo "===== system domain (head) ====="
          head -n 40 /tmp/sys.txt || true
          LABEL=$(grep -oE 'com\.apple\.[a-zA-Z0-9._-]+' /tmp/sys.txt | head -n 1)
          echo
          echo "===== ${LABEL} (raw) ====="
          sudo launchctl print "system/${LABEL}" >/tmp/svc.txt 2>/dev/null || true
          head -n 40 /tmp/svc.txt || true

  # The non-systemd Linux path: run our jar inside an Alpine+OpenRC container so platform
  # detection hits LINUX_OPENRC. Best-effort — container quirks shouldn't fail the run.
  probe-openrc:
    name: probe (alpine/openrc)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build jar (on host)
        run: mvn -B -ntp -DskipTests package

      - name: Probe inside Alpine + OpenRC
        run: |
          # The jar targets JDK 25 (FFM). Alpine's packaged JDK may lag, so fetch the Temurin 25
          # musl build for a reliable 25 runtime inside the container.
          docker run --rm -v "$PWD:/w" -w /w alpine:latest sh -c '
            apk add --no-cache openrc curl >/dev/null &&
            curl -fsSL -o /tmp/jdk.tar.gz "https://api.adoptium.net/v3/binary/latest/25/ga/alpine-linux/x64/jdk/hotspot/normal/eclipse" &&
            mkdir -p /opt/jdk && tar xzf /tmp/jdk.tar.gz -C /opt/jdk --strip-components=1 &&
            export PATH=/opt/jdk/bin:$PATH &&
            java -version &&
            echo "rc-service: $(command -v rc-service)" &&
            echo "===== discovery CLI =====" &&
            java -jar target/servicepal.jar || true &&
            echo "===== mutation self-test (install -> start -> uninstall) =====" &&
            java -cp target/servicepal.jar com.u1.servicepal.cli.SelfTestCli || true'
